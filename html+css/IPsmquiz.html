<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Investment & Pension Scams Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
</head>

<body>
  <div class="bg-blur"></div>

  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div> 
        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>  
        </div>
      </header>
      <div class="header-row">
        <div>
          <div class="title">Investment & Pension Scams Quiz</div>
          <div class="subtitle">
            Test your knowledge about investment and pension scams and learn how to stay safe from
            fake offers, pressure tactics, and risky schemes.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>
      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>
      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button class="tool-btn" type="button" onclick="window.location.href='IPsmvid.html'" style="min-width:170px; height:56px; border-radius:14px;">← Back</button>
        <button class="tool-btn" id="nextBtn" type="button" style="display:none; min-width:170px; height:56px; border-radius:14px;">Next question →</button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>
      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>
      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">Try Again</button>
        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">Dashboard</button>
      </div>
    </section>

  </div>

  <script>
    const API_URL = "http://localhost:5001";
    const quizData = [
      {
        question: "What is an investment or pension scam?",
        options: ["A free savings account", "A scam that tries to steal your pension or savings using attractive offers", "A normal bank transfer", "A safe government scheme"],
        answer: 1
      },
      {
        question: "Which of these is a warning sign of a pension scam?",
        options: ["An official annual statement you expected", "A cold call about your pension", "A letter from your bank branch", "A savings account you opened yourself"],
        answer: 1
      },
      {
        question: "Which offer should make you suspicious?",
        options: ["Being told to take time and get advice", "A low-risk product explained clearly", "Early access to your pension before age 55 for a fee", "A meeting with your own adviser"],
        answer: 2
      },
      {
        question: "Which of these investments can be used in scams?",
        options: ["Wine, jewellery, carbon credits, or land", "Grocery shopping", "Utility bills", "Postage stamps only"],
        answer: 0
      },
      {
        question: "What should you do if someone pressures you to act quickly?",
        options: ["Invest straight away", "Stay calm and end the call if needed", "Give them your bank details", "Recruit a friend as well"],
        answer: 1
      },
      {
        question: "Why should you be careful with celebrity investment adverts online?",
        options: ["Celebrities never advertise", "They are always illegal", "Endorsements can be faked by scammers", "They only appear on TV"],
        answer: 2
      },
      {
        question: "What is a good rule if an offer sounds too good to be true?",
        options: ["It is probably genuine", "It is probably a scam", "It must be tax-free", "It should be shared online immediately"],
        answer: 1
      },
      {
        question: "Who can you contact for independent pension guidance?",
        options: ["Pension Wise (MoneyHelper)", "A random caller", "Social media support", "Any unknown overseas firm"],
        answer: 0
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let fontScale = 1;

    const questionText = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackBox = document.getElementById("feedbackBox");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const quizCard = document.getElementById("quizCard");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const resultMessage = document.getElementById("resultMessage");
    const restartBtn = document.getElementById("restartBtn");

    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";

      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";

      optionsContainer.innerHTML = "";
      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `<input type="radio" name="answer" id="opt${i}" value="${i}"><label for="opt${i}">${opt}</label>`;
        optionsContainer.appendChild(div);
      });

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }

    function handleAnswer(e) {
      if (answered) return;
      answered = true;

      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;

      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }

      feedbackBox.style.display = "block";
      document.querySelectorAll('input[name="answer"]').forEach(input => { input.disabled = true; });

      nextBtn.textContent = currentQuestion === quizData.length - 1 ? "See Results →" : "Next question →";
      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

    /* FIX: fetch is now properly inside showResults() */
    async function showResults() {
      quizCard.style.display = "none";
      resultCard.style.display = "block";
      scoreText.textContent = `${score}/${quizData.length}`;

      if (score === quizData.length) {
        resultMessage.textContent = "Excellent work! You got a perfect score — you really know how to stay safe from investment and pension scams.";
      } else if (score >= 6) {
        resultMessage.textContent = "Well done! You have a strong understanding of these scams. Keep it up!";
      } else if (score >= 4) {
        resultMessage.textContent = "Good effort! You're getting there — a quick review will help you improve even more.";
      } else {
        resultMessage.textContent = "Keep trying! Review the safety tips again and you'll do even better next time.";
      }

      const token = localStorage.getItem("cws_token");
      if (token) {
        try {
          await fetch(`${API_URL}/api/progress`, {
            method: "PUT",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
            body: JSON.stringify({ investment_quiz: true, quizScore: score })
          });
        } catch (err) { console.error("Could not save quiz score:", err); }
      }
    }
    loadQuestion();
  </script>
  <script src="allpage.js"></script>
</body>
</html>
