<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relationship Scams Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
</head>

<body>
  <div class="bg-blur"></div>

  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div> 

        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>
        </div>
      </header>

      <div class="header-row">
        <div>
          <div class="title">Relationship Scams Quiz</div>
          <div class="subtitle">
            Test your knowledge about relationship scams and learn how to stay safe from fake online romance,
            friendship tricks, and money requests.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button
          class="tool-btn"
          type="button"
          onclick="window.location.href='relationshipvideo.html'"
          style="min-width:70px; height:56px; border-radius:14px;"
        >
          ← Back
        </button>

        <button
          class="tool-btn"
          id="nextBtn"
          type="button"
          style="display:none; min-width:70px; height:56px; border-radius:14px;"
        >
          Next question →
        </button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>

      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>

      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>

      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">
          Try Again
        </button>

        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">
          Dashboard
        </button>
      </div>
    </section>

  </div>

  <script>
    const API_URL = "https://cyberwise-production-eb57.up.railway.app";
    const quizData = [
      {
        question: "What is a relationship scam?",
        options: [
          "A real friendship that becomes serious",
          "Someone pretending to care about you to get money or personal information",
          "A problem with your phone connection",
          "An error on a dating website"
        ],
        answer: 1
      },
      {
        question: "Where do relationship scammers often find people?",
        options: [
          "Only in local shops",
          "Only by letter",
          "On social media, dating sites, gaming apps, and messaging apps",
          "Only through work emails"
        ],
        answer: 2
      },
      {
        question: "What does 'love bombing' mean?",
        options: [
          "Sending too many gifts in the post",
          "Messaging or calling a lot and showing strong feelings very quickly",
          "Blocking someone after one message",
          "Reporting someone online"
        ],
        answer: 1
      },
      {
        question: "Which of these is a warning sign of a relationship scam?",
        options: [
          "They ask for money for an emergency",
          "They suggest meeting in a public place",
          "They tell you to speak with your family first",
          "They are happy to video call"
        ],
        answer: 0
      },
      {
        question: "What should you do if someone you only know online asks you for money?",
        options: [
          "Send a small amount to help",
          "Stop contact and do not send money",
          "Give them your bank details instead",
          "Ask them to pay you back later"
        ],
        answer: 1
      },
      {
        question: "Why should you never agree to transfer money for someone else?",
        options: [
          "It takes too much time",
          "It may involve you in money laundering",
          "It always costs a bank fee",
          "It will close your account immediately"
        ],
        answer: 1
      },
      {
        question: "Which of these may be a sign of a fake profile?",
        options: [
          "A profile with very little information and few friends or followers",
          "A profile with family photos and comments",
          "A profile that has been active for years",
          "A profile that agrees to video chat"
        ],
        answer: 0
      },
      {
        question: "What should you do if you think you have been scammed?",
        options: [
          "Keep it secret",
          "Send more money to fix the problem",
          "Contact your bank, change your passwords, and stop contact",
          "Wait a few weeks and see what happens"
        ],
        answer: 2
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let fontScale = 1;

    const questionText = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackBox = document.getElementById("feedbackBox");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const quizCard = document.getElementById("quizCard");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const resultMessage = document.getElementById("resultMessage");
    const restartBtn = document.getElementById("restartBtn");

    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";

      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";

      optionsContainer.innerHTML = "";

      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `
          <input type="radio" name="answer" id="opt${i}" value="${i}">
          <label for="opt${i}">${opt}</label>
        `;
        optionsContainer.appendChild(div);
      });

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }

    function handleAnswer(e) {
      if (answered) return;
      answered = true;

      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;

      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }

      feedbackBox.style.display = "block";

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.disabled = true;
      });

      nextBtn.textContent = currentQuestion === quizData.length - 1
        ? "See Results →"
        : "Next question →";

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;

      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

  async function showResults() {
    quizCard.style.display = "none";
    resultCard.style.display = "block";
    scoreText.textContent = `${score}/${quizData.length}`;
    
    if (score === quizData.length) {
      resultMessage.textContent = "Excellent work! You got a perfect score!";
    } else if (score >= 6) {
      resultMessage.textContent = "Well done! You have a strong understanding. Keep it up!";
    } else if (score >= 4) {
      resultMessage.textContent = "Good effort! A quick review will help you improve.";
    } else {
      resultMessage.textContent = "Keep trying! Review the safety tips and you'll do better next time.";
    }
    
    const token = localStorage.getItem("cws_token");
    if (token) {
      try {
        await fetch(`${API_URL}/api/progress`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ relationship_quiz: true, quizScore: score })
      });
    } catch (err) { console.error("Could not save quiz score:", err); }
  }
}
      loadQuestion();
  </script>
  <script src="allpage.js"></script>
</body>
</html>
