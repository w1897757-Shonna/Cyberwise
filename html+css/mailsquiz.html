<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mail Scams Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
</head>

<body>
  <div class="bg-blur"></div>

  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div>
        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>
        </div>
      </header>
      <div class="header-row">
        <div>
          <div class="title">Mail Scams Quiz</div>
          <div class="subtitle">
            Test your knowledge about mail scams and learn how to stay safe from fake prize letters,
            suspicious bills, inheritance scams, and other scam post.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button
          class="tool-btn"
          type="button"
          onclick="window.location.href='mailsvid.html'"
          style="min-width:170px; height:56px; border-radius:14px;"
        >
          ← Back
        </button>
        <button
          class="tool-btn"
          id="nextBtn"
          type="button"
          style="display:none; min-width:170px; height:56px; border-radius:14px;"
        >
          Next question →
        </button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>
      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>
      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">Try Again</button>
        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">Dashboard</button>
      </div>
    </section>

  </div><!-- end .page -->

  <script>
    const quizData = [
      {
        question: "What is a mail scam?",
        options: [
          "A delayed letter",
          "A fake letter designed to trick you out of money",
          "A letter from your bank",
          "A birthday card"
        ],
        answer: 1
      },
      {
        question: "Which of these is a warning sign of a mail scam?",
        options: [
          "A letter from someone you know",
          "A prize letter asking for an admin fee to claim winnings",
          "A birthday invitation",
          "A letter with your correct postcode"
        ],
        answer: 1
      },
      {
        question: "What should you do with a suspicious scam letter?",
        options: [
          "Reply to ask questions",
          "Keep it and send money later",
          "Ignore it and throw it away",
          "Call the number in the letter"
        ],
        answer: 2
      },
      {
        question: "Why should you avoid calling premium-rate numbers starting with 09?",
        options: [
          "They are always disconnected",
          "They can cost a lot of money",
          "They only work at night",
          "They go straight to the police"
        ],
        answer: 1
      },
      {
        question: "If you get a bill from a company you do not recognise, what should you do?",
        options: [
          "Pay it quickly",
          "Use the contact details printed on the bill",
          "Check the company using trusted official details",
          "Ignore all future bills forever"
        ],
        answer: 2
      },
      {
        question: "Which of these could be a scam?",
        options: [
          "A solicitor letter about an unclaimed inheritance overseas",
          "A receipt for a shop you visited",
          "A confirmed appointment letter",
          "A card from a friend"
        ],
        answer: 0
      },
      {
        question: "What can help reduce unwanted sales or marketing post?",
        options: [
          "Calling every sender back",
          "Registering with the Mailing Preference Service (MPS)",
          "Opening every letter",
          "Changing your name"
        ],
        answer: 1
      },
      {
        question: "If you have lost money because of a mail scam, what should you do first?",
        options: [
          "Throw away your bank card",
          "Call your bank to freeze accounts or cancel cards",
          "Wait a week",
          "Reply to the scam letter"
        ],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let fontScale = 1;

    const questionText = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackBox = document.getElementById("feedbackBox");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const quizCard = document.getElementById("quizCard");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const resultMessage = document.getElementById("resultMessage");
    const restartBtn = document.getElementById("restartBtn");

    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";

      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";

      optionsContainer.innerHTML = "";

      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `
          <input type="radio" name="answer" id="opt${i}" value="${i}">
          <label for="opt${i}">${opt}</label>
        `;
        optionsContainer.appendChild(div);
      });

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }

    function handleAnswer(e) {
      if (answered) return;
      answered = true;

      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;

      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }

      feedbackBox.style.display = "block";

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.disabled = true;
      });

      nextBtn.textContent = currentQuestion === quizData.length - 1
        ? "See Results →"
        : "Next question →";

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

    /* FIX: fetch is now properly inside showResults() */
    async function showResults() {
      quizCard.style.display = "none";
      resultCard.style.display = "block";

      scoreText.textContent = `${score}/${quizData.length}`;

      if (score === quizData.length) {
        resultMessage.textContent = "Excellent work! You got a perfect score — you really know how to stay safe from mail scams.";
      } else if (score >= 6) {
        resultMessage.textContent = "Well done! You have a strong understanding of mail scams. Keep it up!";
      } else if (score >= 4) {
        resultMessage.textContent = "Good effort! You're getting there — a quick review will help you improve even more.";
      } else {
        resultMessage.textContent = "Keep trying! Review the mail scam safety tips again and you'll do even better next time.";
      }

      const token = localStorage.getItem("cws_token");
      if (token) {
        try {
          await fetch("http://localhost:5001/api/progress", {
            method: "PUT",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
            body: JSON.stringify({ mail_quiz: true, quizScore: score })
          });
        } catch (err) {
          console.error("Could not save quiz score:", err);
        }
      }
    }
    loadQuestion();
  </script>
  <script src="allpage.js"></script>
</body>
</html>
