<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Doorstep Scams Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
</head>
<body>
  <div class="bg-blur"></div>

  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div>
        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>
        </div>
      </header>
      <div class="header-row">
        <div>
          <div class="title">Doorstep Scams Quiz</div>
          <div class="subtitle">
            Test your knowledge about doorstep scams and learn how to stay safe from fake traders,
            pushy sellers, and strangers trying to gain access to your home.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button
          class="tool-btn"
          type="button"
          onclick="window.location.href='doorstepvid.html'"
          style="min-width:170px; height:56px; border-radius:14px;"
        >
          ← Back
        </button>
        <button
          class="tool-btn"
          id="nextBtn"
          type="button"
          style="display:none; min-width:170px; height:56px; border-radius:14px;"
        >
          Next question →
        </button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>
      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>
      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">Try Again</button>
        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">Dashboard</button>
      </div>
    </section>

  </div><!-- end .page -->

  <script>
    const quizData = [
      {
        question: "What is a doorstep scam?",
        options: [
          "A scheduled home visit",
          "A visitor bringing a parcel",
          "Someone coming to your door to trick you into giving money, valuables, or access",
          "A neighbour asking to borrow something"
        ],
        answer: 2
      },
      {
        question: "Which of these is a warning sign of a doorstep scam?",
        options: [
          "A trader claims there is something wrong with your property and pressures you to pay quickly",
          "A family member visiting at an agreed time",
          "A neighbour saying hello",
          "A repair booked in advance"
        ],
        answer: 0
      },
      {
        question: "What should you do if someone comes to your door unexpectedly?",
        options: [
          "Open the door fully straight away",
          "Let them in so they can explain",
          "Check safely before opening, using a chain or looking through a window",
          "Give them your bank details"
        ],
        answer: 2
      },
      {
        question: "What does 'Stop • Lock • Chain • Check' help you do?",
        options: [
          "Ignore every visitor",
          "Open the door more quickly",
          "Safely deal with unexpected callers at the door",
          "Call emergency services every time"
        ],
        answer: 2
      },
      {
        question: "Which of these is NOT a safe thing to do?",
        options: [
          "Ask for ID",
          "Use a door chain",
          "Buy something from a doorstep seller",
          "Check details yourself"
        ],
        answer: 2
      },
      {
        question: "What should you do if someone says they are from a utility company?",
        options: [
          "Let them in immediately",
          "Check their ID and verify them using an official phone number",
          "Hand over your card details",
          "Sign forms straight away"
        ],
        answer: 1
      },
      {
        question: "Why should you be careful with deals that sound too good to be true?",
        options: [
          "They may be scams or poor-quality work",
          "They are always illegal",
          "They only happen at night",
          "They are always from real companies"
        ],
        answer: 0
      },
      {
        question: "Who can you contact to report a scam?",
        options: [
          "Any stranger nearby",
          "Action Fraud",
          "The person at the door",
          "A delivery company only"
        ],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let fontScale = 1;

    const questionText = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackBox = document.getElementById("feedbackBox");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const quizCard = document.getElementById("quizCard");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const resultMessage = document.getElementById("resultMessage");
    const restartBtn = document.getElementById("restartBtn");

    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";

      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";

      optionsContainer.innerHTML = "";

      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `
          <input type="radio" name="answer" id="opt${i}" value="${i}">
          <label for="opt${i}">${opt}</label>
        `;
        optionsContainer.appendChild(div);
      });

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }

    function handleAnswer(e) {
      if (answered) return;
      answered = true;

      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;

      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }

      feedbackBox.style.display = "block";

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.disabled = true;
      });

      nextBtn.textContent = currentQuestion === quizData.length - 1
        ? "See Results →"
        : "Next question →";

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

    async function showResults() {
      quizCard.style.display = "none";
      resultCard.style.display = "block";
      scoreText.textContent = `${score}/${quizData.length}`;

      if (score === quizData.length) {
        resultMessage.textContent = "Excellent work! You got a perfect score!";
      } else if (score >= 6) {
        resultMessage.textContent = "Well done! You have a strong understanding. Keep it up!";
      } else if (score >= 4) {
        resultMessage.textContent = "Good effort! A quick review will help you improve.";
      } else {
        resultMessage.textContent = "Keep trying! Review the safety tips and you'll do better next time.";
      }

      const token = localStorage.getItem("cws_token");
      if (token) {
        try {
          await fetch("http://localhost:5001/api/progress", {
            method: "PUT",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
            body: JSON.stringify({ doorstep_quiz: true, quizScore: score })
          });
        } catch (err) {
          console.error("Could not save quiz score:", err);
        }
      }
    }
    loadQuestion();
  </script>
  <script src="allpage.js"></script>
</body>
</html>
