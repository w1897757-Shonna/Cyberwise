<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Business Email Scam Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />

</head>
<body>
  <div class="bg-blur"></div>
 
  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div>

        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>
        </div>
      </header>

      <div class="header-row">
        <div>
          <div class="title">Business Email Scam Quiz</div>
          <div class="subtitle">
            Test your knowledge about business email scams and learn how to avoid sending money to the wrong account.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button
          class="tool-btn"
          type="button"
          onclick="window.location.href='bscvid.html'"
          style="min-width:170px; height:56px; border-radius:14px;"
        >
          ← Back
        </button>

        <button
          class="tool-btn"
          id="nextBtn"
          type="button"
          style="display:none; min-width:170px; height:56px; border-radius:14px;"
        >
          Next question →
        </button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>

      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>

      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>

      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">
          Try Again
        </button>

        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">
          Dashboard
        </button>
      </div>
    </section>

  </div>

  <script>
    
    const quizData = [
      { question: "What is a business email scam?", options: ["A normal business email","A scam where someone pretends to be a company to trick you into sending money","A delayed invoice","A delivery email"], answer: 1 },
      { question: "What usually happens in a business email scam?", options: ["You receive a genuine receipt","You get an email asking for payment with changed bank details","You get a refund","You get a phone call only"], answer: 1 },
      { question: "Which of these is a warning sign?", options: ["The company contacts you using official details","The email address looks slightly different from usual","The invoice matches your records","The payment is expected"], answer: 1 },
      { question: "What should you do if a company changes its bank details?", options: ["Pay immediately","Ignore it completely","Check with the company using a trusted phone number","Reply to the email"], answer: 2 },
      { question: "Why should you not use the phone number in a suspicious email?", options: ["It may take too long","It may connect you to the scammer","It will cost money","It won't work"], answer: 1 },
      { question: "What is the safest action before sending money?", options: ["Send it quickly","Stop and check the details carefully","Forward the email","Delete your account"], answer: 1 },
      { question: "What should you do if you have already sent money to a scammer?", options: ["Wait a few days","Send more money","Contact your bank immediately","Ignore it"], answer: 2 },
      { question: "What is the simple rule to stay safe?", options: ["Pay quickly","Reply first","Stop, Check, Call, Then Pay","Delete all emails"], answer: 2 }
    ];
  
    let currentQuestion = 0;
    let score = 0;
    let answered = false;
  
    const questionText     = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn          = document.getElementById("nextBtn");
    const feedbackBox      = document.getElementById("feedbackBox");
    const progressText     = document.getElementById("progressText");
    const progressFill     = document.getElementById("progressFill");
    const quizCard         = document.getElementById("quizCard");
    const resultCard       = document.getElementById("resultCard");
    const scoreText        = document.getElementById("scoreText");
    const resultMessage    = document.getElementById("resultMessage");
    const restartBtn       = document.getElementById("restartBtn");
  
    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";
  
      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";
  
      optionsContainer.innerHTML = "";
  
      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `
          <input type="radio" name="answer" id="opt${i}" value="${i}">
          <label for="opt${i}">${opt}</label>
        `;
        optionsContainer.appendChild(div);
      });
  
      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }
  
    function handleAnswer(e) {
      if (answered) return;
      answered = true;
  
      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;
  
      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }
  
      feedbackBox.style.display = "block";
  
      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.disabled = true;
      });
  
      nextBtn.textContent = currentQuestion === quizData.length - 1
        ? "See Results →"
        : "Next question →";
  
      nextBtn.style.display = "inline-block";
    }
  
    nextBtn.addEventListener("click", async () => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        await showResults();
      }
    });
  
    async function showResults() {
      // Hide quiz card and show result card
      quizCard.style.display = "none";
      resultCard.style.display = "block";
      scoreText.textContent = `${score}/${quizData.length}`;
  
      if (score === quizData.length) {
        resultMessage.textContent = "Excellent work! You got a perfect score!";
      } else if (score >= 6) {
        resultMessage.textContent = "Well done! You have a strong understanding. Keep it up!";
      } else if (score >= 4) {
        resultMessage.textContent = "Good effort! A quick review will help you improve.";
      } else {
        resultMessage.textContent = "Keep trying! Review the safety tips and you'll do better next time.";
      }
  
      // Save quiz completion to backend
      const token = localStorage.getItem("cws_token");
      if (token) {
        try {
          await fetch(`${API_URL}/api/progress`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ business_quiz: true, quizScore: score })
          });
        } catch (err) {
          console.error("Could not save quiz score:", err);
        }
      }
    }
  
    // Try Again button — resets everything back to the start
    restartBtn.addEventListener("click", () => {
      currentQuestion = 0;
      score = 0;
      answered = false;
      resultCard.style.display = "none";
      quizCard.style.display = "block";
      loadQuestion();
    });
  
    loadQuestion();
  </script>
  <script src="allpage.js"></script>
</body>
</html>
