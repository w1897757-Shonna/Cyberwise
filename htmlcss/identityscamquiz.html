<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Identity Theft Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
</head>

<body>
  <div class="bg-blur"></div>

  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div>
 
        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>
      </header>

      <div class="header-row">
        <div>
          <div class="title">Identity Theft Quiz</div>
          <div class="subtitle">
            Test your knowledge about identity theft and learn how to protect your personal information,
            bank accounts, cards, and online accounts.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button
          class="tool-btn"
          type="button"
          onclick="window.location.href='identityscamvid.html'"
          style="min-width:170px; height:56px; border-radius:14px;"
        >
          ← Back
        </button>

        <button
          class="tool-btn"
          id="nextBtn"
          type="button"
          style="display:none; min-width:170px; height:56px; border-radius:14px;"
        >
          Next question →
        </button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>

      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>

      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>

      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">
          Try Again
        </button>

        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">
          Dashboard
        </button>
      </div>
    </section>

  </div>

  <script>
    const API_URL = "https://cyberwise-production-eb57.up.railway.app";
    const quizData = [
      {
        question: "What is identity theft?",
        options: [
          "Losing your keys",
          "Someone stealing your personal information and using it for fraud",
          "Forgetting your password",
          "Changing your bank account"
        ],
        answer: 1
      },
      {
        question: "Which of these is a warning sign of identity theft?",
        options: [
          "Receiving your normal bank statement",
          "Unfamiliar activity or missing money from your bank account",
          "Getting a birthday card",
          "Changing your phone wallpaper"
        ],
        answer: 1
      },
      {
        question: "What should you do if your bank card is lost or stolen?",
        options: [
          "Wait a few days",
          "Lend it to someone you trust",
          "Cancel it quickly",
          "Hide it in a drawer"
        ],
        answer: 2
      },
      {
        question: "Why is two-factor authentication (2FA) useful?",
        options: [
          "It makes passwords shorter",
          "It adds extra security to your accounts",
          "It removes your PIN",
          "It stops all junk mail"
        ],
        answer: 1
      },
      {
        question: "What is the safest way to deal with PINs and passwords?",
        options: [
          "Share them with friends",
          "Write them on your bank card",
          "Keep them private and use strong passwords",
          "Use the same password for everything"
        ],
        answer: 2
      },
      {
        question: "What should you do with important papers before throwing them away?",
        options: [
          "Put them straight in the bin",
          "Leave them outside",
          "Shred them carefully",
          "Give them to a neighbour"
        ],
        answer: 2
      },
      {
        question: "What can help protect your post when you move house?",
        options: [
          "Ignore old letters",
          "Redirect your post",
          "Throw away all mail",
          "Change your first name"
        ],
        answer: 1
      },
      {
        question: "Which organisation can help with protective registration for credit checks?",
        options: [
          "Royal Mail",
          "Cifas",
          "DVLA",
          "NHS"
        ],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let fontScale = 1;

    const questionText = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackBox = document.getElementById("feedbackBox");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const quizCard = document.getElementById("quizCard");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const resultMessage = document.getElementById("resultMessage");
    const restartBtn = document.getElementById("restartBtn");

    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";

      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";

      optionsContainer.innerHTML = "";

      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `
          <input type="radio" name="answer" id="opt${i}" value="${i}">
          <label for="opt${i}">${opt}</label>
        `;
        optionsContainer.appendChild(div);
      });

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }

    function handleAnswer(e) {
      if (answered) return;
      answered = true;

      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;

      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }

      feedbackBox.style.display = "block";

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.disabled = true;
      });

      nextBtn.textContent = currentQuestion === quizData.length - 1
        ? "See Results →"
        : "Next question →";

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;

      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });
    
    async function showResults() {
      quizCard.style.display = "none";
      resultCard.style.display = "block";
      scoreText.textContent = `${score}/${quizData.length}`;
      if (score === quizData.length) {
        resultMessage.textContent = "Excellent work! You got a perfect score!";
      } else if (score >= 6) {
        resultMessage.textContent = "Well done! You have a strong understanding. Keep it up!";
      } else if (score >= 4) {
        resultMessage.textContent = "Good effort! A quick review will help you improve.";
      } else {
        resultMessage.textContent = "Keep trying! Review the safety tips and you'll do better next time.";
      }
      
      const token = localStorage.getItem("cws_token");
      if (token) {
        try {
          await fetch(`${API_URL}/api/progress`, {
            method: "PUT",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
            body: JSON.stringify({ identity_quiz: true, quizScore: score })
          });
        } catch (err) { console.error("Could not save quiz score:", err); }
      }
    }
    loadQuestion();
  </script>
  <script src="allpage.js"></script>
</body>
</html>
