<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Buying and Selling Scams Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
</head>

<body>
  <div class="bg-blur"></div>

  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div>

        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>
        </div>
      </header> 

      <div class="header-row">
        <div>
          <div class="title">Buying and Selling Scams Quiz</div>
          <div class="subtitle">
            Test your knowledge about buying and selling scams and learn how to avoid fake sellers,
            fake buyers, scam websites, and unsafe payments.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button
          class="tool-btn"
          type="button"
          onclick="window.location.href='buyingscamvid.html'"
          style="min-width:170px; height:56px; border-radius:14px;"
        >
          ← Back
        </button>

        <button
          class="tool-btn"
          id="nextBtn"
          type="button"
          style="display:none; min-width:170px; height:56px; border-radius:14px;"
        >
          Next question →
        </button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>

      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>

      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>

      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">
          Try Again
        </button>

        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">
          Dashboard
        </button>
      </div>
    </section>

  </div>
  <script>
    const quizData = [
      {
        question: "What is a buying and selling scam?",
        options: [
          "A delayed parcel",
          "A scam where someone pretends to be a real buyer, seller, or shop to steal money or details",
          "A normal refund",
          "A safe online order"
        ],
        answer: 1
      },
      {
        question: "Which of these is a warning sign?",
        options: [
          "The price is much lower than normal",
          "The seller gives clear contact details",
          "The item is inspected in person",
          "The payment is through a trusted platform"
        ],
        answer: 0
      },
      {
        question: "What should you do before paying for something online?",
        options: [
          "Pay quickly before it sells out",
          "Stop and check the seller or website first",
          "Send cash to be safe",
          "Ignore all reviews"
        ],
        answer: 1
      },
      {
        question: "Which payment method is often a warning sign in a scam?",
        options: [
          "Safer payment methods on trusted platforms",
          "Paying by gift card, crypto, or unusual bank transfer",
          "Paying after inspection",
          "Using official checkout pages"
        ],
        answer: 1
      },
      {
        question: "What is suspicious about a buyer sending too much money?",
        options: [
          "It means they are generous",
          "It may be a scam and they may ask for some money back",
          "It shows they trust you",
          "It is always part of a discount"
        ],
        answer: 1
      },
      {
        question: "How can you check if a website may be fake?",
        options: [
          "Only look at the logo",
          "Check the web address, reviews, and contact details",
          "Trust it if the page looks professional",
          "Enter your details first"
        ],
        answer: 1
      },
      {
        question: "Which of these is a common example of a buying and selling scam?",
        options: [
          "A verified order from a known shop",
          "A fake rental listing asking for a deposit before viewing",
          "A receipt from a supermarket",
          "A booked repair from a company you used before"
        ],
        answer: 1
      },
      {
        question: "What should you do if you think you have been scammed?",
        options: [
          "Keep sending messages to argue",
          "Contact your bank straight away and keep evidence",
          "Delete all your accounts immediately",
          "Send more money to recover your loss"
        ],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    const questionText     = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn          = document.getElementById("nextBtn");
    const feedbackBox      = document.getElementById("feedbackBox");
    const progressText     = document.getElementById("progressText");
    const progressFill     = document.getElementById("progressFill");
    const quizCard         = document.getElementById("quizCard");
    const resultCard       = document.getElementById("resultCard");
    const scoreText        = document.getElementById("scoreText");
    const resultMessage    = document.getElementById("resultMessage");
    const restartBtn       = document.getElementById("restartBtn");

    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";

      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";

      optionsContainer.innerHTML = "";

      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `
          <input type="radio" name="answer" id="opt${i}" value="${i}">
          <label for="opt${i}">${opt}</label>
        `;
        optionsContainer.appendChild(div);
      });

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }

    function handleAnswer(e) {
      if (answered) return;
      answered = true;

      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;

      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }

      feedbackBox.style.display = "block";

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.disabled = true;
      });

      nextBtn.textContent = currentQuestion === quizData.length - 1
        ? "See Results →"
        : "Next question →";

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", async () => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        await showResults();
      }
    });

    async function showResults() {
      // Hide quiz and show results
      quizCard.style.display = "none";
      resultCard.style.display = "block";
      scoreText.textContent = `${score}/${quizData.length}`;

      if (score === quizData.length) {
        resultMessage.textContent = "Excellent work! You got a perfect score — you really know how to stay safe from buying and selling scams.";
      } else if (score >= 6) {
        resultMessage.textContent = "Well done! You have a strong understanding of these scams. Keep it up!";
      } else if (score >= 4) {
        resultMessage.textContent = "Good effort! You're getting there — a quick review will help you improve even more.";
      } else {
        resultMessage.textContent = "Keep trying! Review the safety tips again and you'll do even better next time.";
      }

      // Save quiz completion to backend
      const token = localStorage.getItem("cws_token");
      if (token) {
        try {
          await fetch(`${API_URL}/api/progress`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ buying_quiz: true, quizScore: score })
          });
        } catch (err) {
          console.error("Could not save quiz score:", err);
        }
      }
    }

    // Try Again button — resets everything back to the start
    restartBtn.addEventListener("click", () => {
      currentQuestion = 0;
      score = 0;
      answered = false;
      resultCard.style.display = "none";
      quizCard.style.display = "block";
      loadQuestion();
    });

    loadQuestion();
</script>
  <script src="allpage.js"></script>
</body>
</html>
