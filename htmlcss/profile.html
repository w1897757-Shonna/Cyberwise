<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
  <script defer src="allpage.js"></script>
</head>
<body>
  <div class="bg-blur"></div>

  <div class="page">
    <header class="top-bar">
      <div class="brand">
        <img src="images/logo.png" class="logo" alt="CyberWise Seniors Logo" onerror="this.style.display='none';" />
        <div class="brand-text">
          <h1>CyberWise Seniors</h1>
          <p>Stay safe online</p>
        </div>
      </div>
      <div class="tools">
        <button class="tool-btn" id="decreaseText" type="button">A-</button>
        <button class="tool-btn" id="increaseText" type="button">A+</button>
        <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark Mode</button>
        <a href="dashboard.html" class="tool-btn back-btn">Dashboard</a>
      </div>
    </header>

    <main>
      <section class="profile-card" style="padding:32px; max-width:920px; margin:0 auto;">

        <!-- Top row: LEFT = avatar/name/joined | RIGHT = update details form -->
        <div style="display:grid; grid-template-columns:220px 1fr; gap:32px; align-items:start; margin-bottom:28px;">

          <!-- LEFT: avatar + name + joined -->
          <div style="display:flex; flex-direction:column; gap:14px;">
            <div style="display:flex; align-items:center; gap:14px;">
              <div class="avatar-wrap" style="width:68px; height:68px; border-radius:16px; flex-shrink:0;">
                <img src="images/logo.png" alt="Profile Avatar" class="profile-avatar"
                  onerror="this.style.display='none'; this.parentElement.innerHTML='👤';" />
              </div>
              <div>
                <h2 id="profileName" style="font-size:1.35rem; margin-bottom:4px; line-height:1.2;">Guest User</h2>
                <p id="profileEmail" style="color:var(--muted); font-size:0.88rem; word-break:break-word;">cyberwise@example.com</p>
              </div>
            </div>
            <div class="info-box">
              <span style="font-size:0.82rem; color:var(--muted); display:block; margin-bottom:3px;">Joined</span>
              <strong id="joinedDate" style="font-size:0.98rem;">April 2026</strong>
            </div>
          </div>

          <!-- RIGHT: update details form -->
          <div>
            <h3 style="font-size:1.05rem; font-weight:700; margin-bottom:16px; color:var(--text);">Update Personal Details</h3>
            <form id="profileForm">
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
                <div>
                  <label for="fullName" style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:6px; color:var(--text);">Full Name</label>
                  <input type="text" id="fullName" name="fullName" placeholder="Enter your full name"
                    style="width:100%; margin-top:0; height:44px; border-radius:12px; padding:0 14px;" />
                </div>
                <div>
                  <label for="emailAddress" style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:6px; color:var(--text);">Email Address</label>
                  <input type="email" id="emailAddress" name="emailAddress" placeholder="Enter your email"
                    style="width:100%; margin-top:0; height:44px; border-radius:12px; padding:0 14px;" />
                </div>

              </div>
              <button type="submit" class="main-btn"
                style="height:44px; padding:0 24px; width:auto; border-radius:12px; margin-top:4px;">
                Save Details
              </button>
            </form>
          </div>

        </div>

        <!-- Divider -->
        <hr style="border:none; border-top:1px solid var(--border); margin-bottom:24px;" />

        <!-- Change password row -->
        <h3 style="font-size:1.05rem; font-weight:700; margin-bottom:16px; color:var(--text);">Change Password</h3>
        <form id="passwordForm">
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:12px; align-items:end;">
            <div>
              <label for="currentPassword" style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:6px; color:var(--text);">Current Password</label>
              <input type="password" id="currentPassword" name="currentPassword" placeholder="Current password"
                style="width:100%; margin-top:0; height:44px; border-radius:12px; padding:0 14px;" />
            </div>
            <div>
              <label for="newPassword" style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:6px; color:var(--text);">New Password</label>
              <input type="password" id="newPassword" name="newPassword" placeholder="New password"
                style="width:100%; margin-top:0; height:44px; border-radius:12px; padding:0 14px;" />
            </div>
            <div>
              <label for="confirmPassword" style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:6px; color:var(--text);">Confirm New Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password"
                style="width:100%; margin-top:0; height:44px; border-radius:12px; padding:0 14px;" />
            </div>
            <div style="padding-bottom:1px;">
              <button type="submit" class="main-btn"
                style="height:44px; padding:0 20px; border-radius:12px; white-space:nowrap;">
                Update Password
              </button>
            </div>
          </div>
        </form>

      </section>
    </main>
  </div>
</body>
</html>
