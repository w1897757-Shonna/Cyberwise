<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | CyberWise Seniors</title>
  <link rel="stylesheet" href="allpages.css" />
  <link rel="icon" type="image/png" href="images/logo.png" />
</head>
<body>

  <div class="bg-blur"></div>

  <header class="top-bar">
    <div class="brand">
      <img src="images/logo.png" alt="CyberWise Seniors Logo" class="logo" onerror="this.style.display='none';" />
      <div class="brand-text">
        <h1>CyberWise Seniors</h1>
        <p>Stay safe online</p>
      </div>
    </div>

    <div class="tools">
      <button class="tool-btn" id="decreaseText" type="button">A−</button>
      <button class="tool-btn" id="increaseText" type="button">A+</button>
      <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
    </div>
  </header>

  <main class="shell single-shell">
    <section class="main-card small-card">
      <div class="forgot-wrap">

        <div class="badge">CWS</div>
        <h2>Reset your password</h2>
        <p class="subtitle">
          Enter the email address you used to create your account.
          We'll send you a secure link to reset your password.
        </p>

        <form id="forgotForm">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required />

          <label for="newPassword">New password</label>
          <div class="password-wrap">
            <input type="password" id="newPassword" placeholder="Enter new password" required />
            <button type="button" class="show-pwd" onclick="togglePwd('newPassword', this)">👁 Show</button>
          </div>

          <label for="confirmPassword">Confirm new password</label>
          <div class="password-wrap">
            <input type="password" id="confirmPassword" placeholder="Re-type new password" required />
            <button type="button" class="show-pwd" onclick="togglePwd('confirmPassword', this)">👁 Show</button>
          </div>

          <button type="submit" class="primary">Reset Password</button>

          <p class="small muted" style="margin-top: 12px;">
            Remembered your password?
            <a href="login.html" class="link">Back to login</a>
          </p>
        </form>

        <p class="footer-note inside-note">Never share your password with anyone.</p>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "https://cyberwise-backend.onrender.com";

   
    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      btn.textContent = isHidden ? "🙈 Hide" : "👁 Show";
    }

   
    const root = document.documentElement;
    const MIN = 16, MAX = 24, STEP = 2;

    function getFS() { return parseInt(getComputedStyle(root).fontSize, 10); }
    function setFS(val) {
      root.style.fontSize = val + "px";
      localStorage.setItem("cws_font", String(val));
    }

    const savedFS = parseInt(localStorage.getItem("cws_font") || "", 10);
    if (!Number.isNaN(savedFS)) setFS(Math.min(MAX, Math.max(MIN, savedFS)));

    document.getElementById("increaseText").addEventListener("click", () => {
      const n = getFS(); if (n < MAX) setFS(n + STEP);
    });
    document.getElementById("decreaseText").addEventListener("click", () => {
      const n = getFS(); if (n > MIN) setFS(n - STEP);
    });


    const toggleThemeBtn = document.getElementById("toggleTheme");

    function setMode(mode) {
      const isDark = mode === "dark";
      document.body.classList.toggle("dark", isDark);
      toggleThemeBtn.textContent = isDark ? "☀️ Light mode" : "🌙 Dark mode";
      toggleThemeBtn.setAttribute("aria-pressed", String(isDark));
      localStorage.setItem("cws_mode", mode);
    }

    setMode(localStorage.getItem("cws_mode") || "light");

    toggleThemeBtn.addEventListener("click", () => {
      setMode(document.body.classList.contains("dark") ? "light" : "dark");
    });

    
    document.getElementById("forgotForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email           = document.getElementById("email").value.trim();
      const newPassword     = document.getElementById("newPassword").value;      
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (newPassword.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }

      if (newPassword !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      const btn = e.target.querySelector("button[type=submit]");
      btn.textContent = "Resetting...";
      btn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/api/auth/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, newPassword })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Password reset successfully! You can now log in.");
          window.location.href = "login.html";
        } else {
          alert(data.message || "Something went wrong.");
          btn.textContent = "Reset Password";
          btn.disabled = false;
        }
      } catch {
        alert("Could not connect to the server.");
        btn.textContent = "Reset Password";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
