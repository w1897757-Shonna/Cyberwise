<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phone Scams Quiz | CyberWise Seniors</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="allpages.css" />
</head>

<body>
  <div class="bg-blur"></div>

  <div class="page">

    <section class="hero-card">
      <header class="top-bar">
        <div class="brand">
          <img src="images/logo.png" class="logo" alt="CyberWise Seniors" onerror="this.style.display='none';">
          <div class="brand-text">
            <h1>CyberWise Seniors</h1>
            <p>Stay safe online</p>
          </div>
        </div> 

        <div class="tools">
          <button class="tool-btn" id="decreaseText" type="button">A−</button>
          <button class="tool-btn" id="increaseText" type="button">A+</button>
          <button class="tool-btn" id="toggleTheme" type="button" aria-pressed="false">🌙 Dark mode</button>
          <button class="tool-btn" type="button" onclick="window.location.href='quizzes.html'">Quizzes</button>
        </div>
      </header>

      <div class="header-row">
        <div>
          <div class="title">Phone Scams Quiz</div>
          <div class="subtitle">
            Test your knowledge about phone scams and learn how to stay safe from fake calls, scam texts,
            and urgent money requests.
          </div>
        </div>
      </div>
    </section>

    <section class="hero-card" id="quizCard">
      <div class="quiz-top">
        <h3>Quiz in Progress</h3>
        <div id="progressText">Question 1 of 8</div>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <div id="feedbackBox" style="display:none;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;">
        <button
          class="tool-btn"
          type="button"
          onclick="window.location.href='phonevideo.html'"
          style="min-width:70px; height:56px; border-radius:14px;"
        >
          ← Back
        </button>

        <button
          class="tool-btn"
          id="nextBtn"
          type="button"
          style="display:none; min-width:70px; height:56px; border-radius:14px;"
        >
          Next question →
        </button>
      </div>
    </section>

    <section class="hero-card" id="resultCard" style="display:none;">
      <h3>Quiz Complete</h3>

      <div id="scoreText" style="font-size:1.8rem; font-weight:700; margin-top:10px;"></div>

      <p id="resultMessage" style="margin-top:10px; font-size:1.1rem;"></p>

      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="tool-btn" id="restartBtn" type="button">
          Try Again
        </button>

        <button class="tool-btn" type="button" onclick="window.location.href='dashboard.html'">
          Dashboard
        </button>
      </div>
    </section>

  </div>
  <script>
    const quizData = [
      {
        question: "A caller says they are from your bank and asks for your PIN. What should you do?",
        options: [
          "Give them your PIN",
          "Hang up and contact your bank directly",
          "Ask for their name and continue",
          "Ignore but stay on the call"
        ],
        answer: 1
      },
      {
        question: "Which of the following is a sign of a scam call?",
        options: [
          "They ask for your PIN or personal details",
          "They speak politely",
          "They know your name",
          "They call during the day"
        ],
        answer: 0
      },
      {
        question: "What should you do with suspicious text messages?",
        options: [
          "Click the link",
          "Reply to stop messages",
          "Forward it to 7726",
          "Share it with friends"
        ],
        answer: 2
      },
      {
        question: "A message from a 'family member' asks for urgent money from a new number. What should you do?",
        options: [
          "Send money immediately",
          "Reply asking for details",
          "Call their usual number to check",
          "Ignore and delete"
        ],
        answer: 2
      },
      {
        question: "What is the safest action if someone calls about a 'virus' on your device?",
        options: [
          "Download the software they suggest",
          "Give them remote access",
          "Hang up immediately",
          "Restart your device"
        ],
        answer: 2
      },
      {
        question: "What does forwarding a scam text to 7726 do?",
        options: [
          "Deletes the message",
          "Reports it to your provider",
          "Sends it back to the scammer",
          "Blocks your phone"
        ],
        answer: 1
      },
      {
        question: "Which of the following is true about caller ID?",
        options: [
          "It always shows the real caller",
          "It guarantees the call is safe",
          "It can be faked by scammers",
          "It blocks scam calls automatically"
        ],
        answer: 2
      },
      {
        question: "How can you reduce unwanted cold calls?",
        options: [
          "Answer every call",
          "Register with TPS (free service)",
          "Turn off your phone",
          "Change your number weekly"
        ],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    const questionText     = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn          = document.getElementById("nextBtn");
    const feedbackBox      = document.getElementById("feedbackBox");
    const progressText     = document.getElementById("progressText");
    const progressFill     = document.getElementById("progressFill");
    const quizCard         = document.getElementById("quizCard");
    const resultCard       = document.getElementById("resultCard");
    const scoreText        = document.getElementById("scoreText");
    const resultMessage    = document.getElementById("resultMessage");
    const restartBtn       = document.getElementById("restartBtn");

    function loadQuestion() {
      answered = false;
      nextBtn.style.display = "none";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";

      const q = quizData[currentQuestion];
      questionText.textContent = q.question;
      progressText.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      progressFill.style.width = ((currentQuestion + 1) / quizData.length) * 100 + "%";

      optionsContainer.innerHTML = "";

      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = `
          <input type="radio" name="answer" id="opt${i}" value="${i}">
          <label for="opt${i}">${opt}</label>
        `;
        optionsContainer.appendChild(div);
      });

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener("change", handleAnswer, { once: true });
      });
    }

    function handleAnswer(e) {
      if (answered) return;
      answered = true;

      const selected = Number(e.target.value);
      const correct = quizData[currentQuestion].answer;

      if (selected === correct) {
        score++;
        feedbackBox.textContent = "Correct! Well done.";
      } else {
        feedbackBox.textContent = "Not quite. Correct answer: " + quizData[currentQuestion].options[correct];
      }

      feedbackBox.style.display = "block";

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.disabled = true;
      });

      nextBtn.textContent = currentQuestion === quizData.length - 1
        ? "See Results →"
        : "Next question →";

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", async () => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        await showResults();
      }
    });

    async function showResults() {
      // Hide quiz card and show result card
      quizCard.style.display = "none";
      resultCard.style.display = "block";
      scoreText.textContent = `${score}/${quizData.length}`;

      if (score === quizData.length) {
        resultMessage.textContent = "Excellent work! You got a perfect score!";
      } else if (score >= 6) {
        resultMessage.textContent = "Well done! You have a strong understanding. Keep it up!";
      } else if (score >= 4) {
        resultMessage.textContent = "Good effort! A quick review will help you improve.";
      } else {
        resultMessage.textContent = "Keep trying! Review the safety tips and you'll do better next time.";
      }

      // Save quiz completion to backend
      const token = localStorage.getItem("cws_token");
      if (token) {
        try {
          await fetch(`${API_URL}/api/progress`, {
            method: "PUT",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
            body: JSON.stringify({ phone_quiz: true, quizScore: score })
          });
        } catch (err) { console.error("Could not save quiz score:", err); }
      }
    }

    // Try Again button — resets everything back to the start
    restartBtn.addEventListener("click", () => {
      currentQuestion = 0;
      score = 0;
      answered = false;
      resultCard.style.display = "none";
      quizCard.style.display = "block";
      loadQuestion();
    });

    loadQuestion();
</script>

  <script src="allpage.js"></script>
</body>
</html>
